# Phase 2 feasibility prototype — generative head on VGGT tokens + coupling
seed: 1337

data:
  cache_dir: results/phase1/cache_tokens           # reuse Phase 1 VGGT tokens
  manifest: data/manifests/set_a.json              # for task strings
  val_episode_ids: [3, 9, 14, 19, 24, 29]          # same split as Phase 1
  seq_len: 8                                       # frames per generation window
  stride: 4                                        # sliding-window stride
  empty_task_placeholder: "robot manipulation task"

text_encoder:
  hf_id: openai/clip-vit-base-patch32              # frozen CLIP ViT-B/32 text
  max_length: 32
  output_dim: 512                                  # matches cond_text_dim

generator:
  token_dim: 2048
  token_grid: 8
  seq_len: 8
  cond_text_dim: 512
  hidden_dim: 512                                  # smaller than scaffold (30 clips)
  n_layers: 6
  n_heads: 8
  dropout: 0.0

physics:
  token_dim: 2048
  token_grid: 8
  context_len: 4
  hidden_dim: 384
  n_layers: 3
  n_heads: 6
  phi_dim: 64

coupling:
  context_len: 4                                   # matches frozen Phase 1 predictor
  w_selfconsistency: 1.0
  w_physics: 0.1

predictor_ckpt:
  path: results/phase1/runs/vggt_noact/best.pt     # frozen D_psi (zero-action predictor)
  token_dim: 2048
  action_dim: 7
  hidden_dim: 512
  n_layers: 4
  n_heads: 8
  action_embed_dim: 64
  context_len: 4
  dropout: 0.1
  use_actions: false

train:
  batch_size: 8
  epochs: 40
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  grad_clip: 1.0
  num_workers: 2
  device: cuda

variants:
  flow_only:     { w_selfconsistency: 0.0, w_physics: 0.0 }
  flow_coupled:  { w_selfconsistency: 1.0, w_physics: 0.1 }

eval:
  sample_steps: 24                                 # flow ODE integration steps
  n_eval_windows: 64                               # for held-out metrics
