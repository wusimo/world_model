# Phase 2 — H100-scale CFG action-conditioned generator (G_theta) + coupling
# ~1.5 B generator (32 layers × 2048 hidden × 16 heads + projections + cond) + 60 M physics.
# Trained on the same NFS cache; predictor ckpt is the 1B from Phase 1.
seed: 1337

data:
  cache_dir: /shared/cache/h100_scale
  manifest: data/manifests/h100_scale.json
  val_episode_ids_file: data/manifests/h100_val_ids.json
  extracted_root: /shared/oxe_extracted               # has per-episode actions.npy
  seq_len: 8
  stride: 4
  empty_task_placeholder: "robot manipulation task"
  streaming: true

text_encoder:
  hf_id: openai/clip-vit-large-patch14
  max_length: 64
  output_dim: 768

generator:
  token_dim: 2048
  token_grid: 8
  seq_len: 8
  cond_text_dim: 768
  hidden_dim: 2048                                    # was 1280 in paper_scale; 2048 → ~1.5 B params at 32 layers
  n_layers: 32                                        # was 20
  n_heads: 16
  dropout: 0.0
  use_checkpoint: true
  # CFG action conditioning — same as the autodl paper_scale_cfg.yaml
  action_dim: 14
  action_embed_dim: 128

physics:
  token_dim: 2048
  token_grid: 8
  context_len: 4
  hidden_dim: 1024                                    # was 768
  n_layers: 8                                         # was 6
  n_heads: 16
  phi_dim: 128

coupling:
  context_len: 4
  w_selfconsistency: 1.0
  w_physics: 0.1
  warmup_epochs: 6

predictor_ckpt:
  # Filled in by the runner once Phase 1 produces the 1B ckpt.
  path: /shared/results/phase1_h100/vggt_noact/best.pt
  token_dim: 2048
  action_dim: 14
  hidden_dim: 2048
  n_layers: 24
  n_heads: 16
  action_embed_dim: 256
  context_len: 8
  dropout: 0.1
  use_actions: false
  use_checkpoint: false

train:
  batch_size: 8                                       # per rank (1.5B + 6-step rollout = ~50 GB / rank)
  grad_accum: 4                                       # effective batch = 8 × 32 × 4 = 1024
  epochs: 12
  lr: 1.5e-4
  weight_decay: 0.05
  warmup_steps: 3000
  grad_clip: 1.0
  num_workers: 4
  device: cuda
  amp_dtype: bfloat16
  ckpt_every_steps: 1000
  log_every_steps: 50
  val_every_steps: 2000
  ema_decay: 0.999
  train_sample_steps: 8
  action_cfg_dropout_p: 0.2

variants:
  flow_only:    { w_selfconsistency: 0.0, w_physics: 0.0 }
  flow_coupled: { w_selfconsistency: 1.0, w_physics: 0.1 }

eval:
  sample_steps: 24
  n_eval_windows: 256

ddp:
  backend: nccl
  find_unused_parameters: true

wandb:
  enabled: false
  project: geophys-wm
  entity: null
  run_name: phase2-h100
